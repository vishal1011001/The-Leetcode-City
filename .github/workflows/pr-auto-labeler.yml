name: PR Auto Labeler & Review

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: write
  issues: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Label, Assign, and Request Reviews (runs on every PR event) ──
  label-pr:
    name: Auto-Label & Assign
    runs-on: ubuntu-latest

    steps:
      - name: Auto-Label, Assign & Request Reviews
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const prUser = pr.user.login;
            const headRef = pr.head.ref;
            const prTitle = pr.title;
            const prBody = pr.body || '';
            const action = context.payload.action;

            // ── 1. Define all label specs ──
            // Only labels that follow proper naming conventions.
            // Difficulty: level:X | Type: type:X | GSSoC: required on every PR
            const labelSpecs = {
              // Difficulty labels (required — exactly ONE per issue/PR)
              'level:beginner':     { color: '22c55e', description: 'Beginner difficulty level (20 pts)' },
              'level:intermediate': { color: '3b82f6', description: 'Intermediate difficulty level (35 pts)' },
              'level:advanced':     { color: 'f97316', description: 'Advanced difficulty level (55 pts)' },
              'level:critical':     { color: '6b7280', description: 'Critical difficulty level (80 pts)' },
              'good first issue':   { color: '7057ff', description: 'Good for newcomers' },
              // Quality labels (optional — at most ONE per PR)
              'quality:clean':       { color: '0d9488', description: 'Well-structured, readable code (×1.2 multiplier)' },
              'quality:exceptional': { color: 'a855f7', description: 'Goes beyond what was asked (×1.5 multiplier, requires review comment)' },
              // Type labels (optional, bonuses are cumulative)
              'type:bug':           { color: 'ef4444', description: 'Something isn\'t working as expected (+10 pts)' },
              'type:feature':       { color: '10b981', description: 'New features, additions, or enhancements (+10 pts)' },
              'type:docs':          { color: '3b82f6', description: 'Documentation changes or README updates (+5 pts)' },
              'type:testing':       { color: '8b5cf6', description: 'Adding, updating, or fixing tests (+10 pts)' },
              'type:security':      { color: 'f59e0b', description: 'Security fixes, dependency updates, or hardening (+20 pts)' },
              'type:performance':   { color: '6366f1', description: 'Code changes that improve performance/speed (+15 pts)' },
              'type:design':        { color: 'ec4899', description: 'UI designs, styling, and themes (+10 pts)' },
              'type:refactor':      { color: '14b8a6', description: 'Code changes that neither fix a bug nor add a feature (+10 pts)' },
              'type:accessibility': { color: '06b6d4', description: 'Screen reader support, keyboard nav, contrast, ARIA (+15 pts)' },
              'type:devops':        { color: '78716c', description: 'CI/CD, Dockerfile, GitHub Actions, deployment (+15 pts)' },
              // GSSoC & approval labels (required on every issue/PR)
              'Gssoc 26':         { color: 'e5533d', description: 'GSSoC 2026 contribution' },
              'gssoc:approved':   { color: '0e8a16', description: 'Approved GSSoC contribution' },
              // Blocking labels (exclude PR from scoring entirely)
              'gssoc:invalid':    { color: 'b60205', description: 'PR does not meet minimum bar (0 pts)' },
              'gssoc:spam':       { color: '000000', description: 'Fabricated contribution with no real value (0 pts)' },
              'gssoc:ai-slop':    { color: '5319e7', description: 'AI-generated content pasted without understanding (0 pts)' },
              // Status labels
              'status:blocked':   { color: 'dc2626', description: 'This PR is blocked due to a failing CI check.' },
              'needs-rebase':     { color: 'e11d48', description: 'This PR has merge conflicts and needs a rebase.' },
              'needs-details':    { color: 'f97316', description: 'This PR is missing required description details.' },
              'inactive':         { color: '6b7280', description: 'This PR was closed due to inactivity.' },
            };

            // ── 2. Ensure all labels exist in the repo ──
            for (const [name, spec] of Object.entries(labelSpecs)) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({
                    owner, repo, name,
                    color: spec.color,
                    description: spec.description
                  });
                }
              }
            }

            // ── 3. Auto-detect type from PR title / branch (conventional commits) ──
            const prefixMapping = {
              'fix': 'type:bug', 'bug': 'type:bug', 'bugfix': 'type:bug', 'hotfix': 'type:bug',
              'feat': 'type:feature', 'feature': 'type:feature',
              'docs': 'type:docs', 'doc': 'type:docs',
              'test': 'type:testing', 'testing': 'type:testing',
              'security': 'type:security', 'sec': 'type:security',
              'perf': 'type:performance', 'performance': 'type:performance',
              'style': 'type:design', 'design': 'type:design', 'ui': 'type:design', 'css': 'type:design',
              'refactor': 'type:refactor', 'cleanup': 'type:refactor',
            };

            function detectType(text) {
              if (!text) return null;
              const conventionalRegex = /^\s*([a-zA-Z0-9_-]+)(?:\(.*\))?!?\s*:/i;
              const match = text.match(conventionalRegex);
              if (match) {
                const prefix = match[1].toLowerCase();
                if (prefixMapping[prefix]) return prefixMapping[prefix];
              }
              const clean = text.toLowerCase().trim();
              for (const [key, label] of Object.entries(prefixMapping)) {
                if (clean.startsWith(key + '/') || clean.startsWith(key + '-') || clean === key) {
                  return label;
                }
              }
              return null;
            }

            let labelsToAdd = new Set(['Gssoc 26', 'gssoc:approved', 'good first issue']);

            // Detect type from PR title
            const typeLabel = detectType(prTitle) || detectType(headRef);
            if (typeLabel) labelsToAdd.add(typeLabel);

            // ── 4. Inherit labels from linked issues (BEFORE difficulty detection) ──
            const ALL_DIFFICULTY_LABELS = ['level:beginner', 'level:intermediate', 'level:advanced', 'level:critical'];
            // Map bare labels to their level:X equivalents for migration
            const BARE_TO_LEVEL = { 'beginner': 'level:beginner', 'intermediate': 'level:intermediate', 'advanced': 'level:advanced' };

            const branchMatch = headRef.match(/^(\d+)-/);
            if (branchMatch) {
              const issueNumber = parseInt(branchMatch[1]);
              try {
                const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
                issue.data.labels.forEach(label => {
                  // Convert bare difficulty labels to level:X format
                  const mapped = BARE_TO_LEVEL[label.name];
                  labelsToAdd.add(mapped || label.name);
                });
              } catch (e) {
                console.log(`Could not fetch labels for issue #${issueNumber}`);
              }
            }

            // Also check PR body for "Fixes #N"
            const issueRegex = /(?:fix|fixes|fixed|close|closes|closed|resolve|resolves|resolved)\s+#(\d+)/gi;
            let match;
            while ((match = issueRegex.exec(prBody)) !== null) {
              const issueNum = parseInt(match[1]);
              try {
                const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNum });
                issue.data.labels.forEach(label => {
                  const mapped = BARE_TO_LEVEL[label.name];
                  labelsToAdd.add(mapped || label.name);
                });
              } catch (e) {
                console.log(`Could not fetch labels for issue #${issueNum}`);
              }
            }

            // ── 4a. Ensure exactly ONE difficulty label (level:X format only) ──
            // Per GSSoC spec: scoring engine picks the LOWEST difficulty.
            // We only auto-add ONE; if multiple were inherited, warn but don't auto-remove
            // (the gssoc-label-validator workflow will flag it).
            const inheritedDiffLabels = [...labelsToAdd].filter(l => ALL_DIFFICULTY_LABELS.includes(l));

            if (inheritedDiffLabels.length > 1) {
              // Multiple difficulty labels — keep only the LOWEST (worst-case per spec)
              const lowestFirst = ['level:beginner', 'level:intermediate', 'level:advanced', 'level:critical'];
              const lowest = lowestFirst.find(p => inheritedDiffLabels.includes(p));
              for (const dl of inheritedDiffLabels) {
                if (dl !== lowest) labelsToAdd.delete(dl);
              }
            } else if (inheritedDiffLabels.length === 0) {
              // No difficulty label — auto-detect from PR content
              const difficultyKeywords = {
                'level:advanced':     ['advanced', 'complex', 'critical', 'architecture', 'security', 'migration'],
                'level:intermediate': ['intermediate', 'moderate', 'refactor', 'optimize', 'integration'],
                'level:beginner':     ['beginner', 'easy', 'simple', 'typo', 'readme', 'docs', 'documentation', 'comment', 'label', 'badge'],
              };

              const allText = `${prTitle} ${headRef} ${prBody}`.toLowerCase();
              let detectedDifficulty = null;
              for (const [level, keywords] of Object.entries(difficultyKeywords)) {
                if (keywords.some(kw => allText.includes(kw))) {
                  detectedDifficulty = level;
                  break;
                }
              }
              labelsToAdd.add(detectedDifficulty || 'level:beginner');
            }

            // Remove any bare difficulty labels that may have been inherited
            for (const bare of Object.keys(BARE_TO_LEVEL)) {
              labelsToAdd.delete(bare);
            }
            // NOTE: Quality labels (quality:clean, quality:exceptional) are preserved.
            // They are optional and applied by maintainers. The gssoc-label-validator
            // workflow handles validation (e.g. exceptional requires review comment).

            // ── 5. Apply labels ──
            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: prNumber,
              labels: Array.from(labelsToAdd)
            });

            // ── 6. Auto-Assign PR author ──
            await github.rest.issues.addAssignees({
              owner, repo,
              issue_number: prNumber,
              assignees: [prUser]
            });

            // ── 7. Request Copilot review — ONLY on 'opened' to save tokens ──
            //    Once Copilot is requested, it auto-re-reviews on each new push.
            //    No need to re-request on 'synchronize', saving tokens.
            if (action === 'opened') {
              try {
                await github.rest.pulls.requestReviewers({
                  owner, repo,
                  pull_number: prNumber,
                  reviewers: ['copilot']
                });
                console.log('Requested review from GitHub Copilot');
              } catch (e) {
                console.log('Could not request Copilot review:', e.message);
                // Copilot review may not be available — this is non-fatal
              }
            }

            console.log(`PR #${prNumber} labeled with [${Array.from(labelsToAdd).join(', ')}], assigned to ${prUser}`);

  # ── Job 2: Security Scan (runs on every open/push, uses NO AI tokens) ──
  security-scan:
    name: Security Pattern Scan
    runs-on: ubuntu-latest
    if: >
      github.event.action == 'opened' ||
      github.event.action == 'synchronize'

    steps:
      - name: Scan Diff for Suspicious Patterns
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const prUser = pr.user.login;

            // Fetch diff
            const diffResponse = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              mediaType: { format: 'diff' }
            });

            const diff = typeof diffResponse.data === 'string' ? diffResponse.data : '';
            if (!diff || diff.length === 0) {
              console.log('Empty diff, nothing to scan.');
              return;
            }

            // Security patterns scan (pure regex — no AI tokens used)
            const suspiciousPatterns = [
              { regex: /eval\s*\(/, name: 'eval() usage' },
              { regex: /Function\s*\(/, name: 'Function() constructor' },
              { regex: /child_process|exec\s*\(|execSync/, name: 'shell command execution' },
              { regex: /process\.env\.\w+/, name: 'direct env access (review needed)' },
              { regex: /SUPABASE_SERVICE_ROLE|SECRET|PASSWORD|PRIVATE_KEY/, name: 'hardcoded secret/key reference' },
              { regex: /btoa|atob|Buffer\.from.*base64/, name: 'base64 encoding (potential obfuscation)' },
              { regex: /fetch\s*\(\s*['"`]http:/, name: 'insecure HTTP fetch' },
              { regex: /innerHTML\s*=/, name: 'innerHTML assignment (XSS risk)' },
              { regex: /document\.write/, name: 'document.write (XSS risk)' },
              { regex: /\.env\.local|\.env\.production/, name: 'env file reference' },
            ];

            const findings = [];
            const addedLines = diff.split('\n').filter(l => l.startsWith('+') && !l.startsWith('+++'));

            for (const pattern of suspiciousPatterns) {
              const matches = addedLines.filter(l => {
                if (!pattern.regex.test(l)) return false;
                // Exclude safe GitHub Actions secret references (e.g. secrets.SOMETHING)
                if (pattern.name === 'hardcoded secret/key reference' && /\$\{\{\s*secrets\./.test(l)) return false;
                return true;
              });
              if (matches.length > 0) {
                const preview = matches.slice(0, 3).map(m => `  \`${m.substring(1).trim()}\``).join('\n');
                findings.push(`⚠️ **${pattern.name}** — found in ${matches.length} added line(s):\n${preview}`);
              }
            }

            if (findings.length > 0) {
              const body = `🔍 **Security Scan: Review Needed**\n\nThe following patterns were detected in the latest changes:\n\n${findings.join('\n')}\n\n> A maintainer should review these findings before merging.\n\nHey @${prUser}, please review these flagged items! 🛠️`;

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                body: body,
                event: 'COMMENT'
              });
              console.log(`Security scan found ${findings.length} patterns.`);
            } else {
              // Only post clean scan on first open, not on every push (reduce noise)
              if (context.payload.action === 'opened') {
                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  body: '✅ **Security Scan: Clean**\n\nNo suspicious patterns detected. The official Copilot bot will provide detailed AI feedback shortly.\n\n⭐ **If you enjoyed contributing, please consider starring the repository!**',
                  event: 'COMMENT'
                });
              }
              console.log('Security scan passed.');
            }
