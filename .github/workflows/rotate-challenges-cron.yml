name: LC City Rotate Challenges Cron

on:
  schedule:
    - cron: "0 0 * * *"   # Daily at midnight UTC
  workflow_dispatch:      # Allow manual trigger from GitHub UI

permissions:
  contents: read

concurrency:
  group: rotate-challenges-cron
  cancel-in-progress: true

jobs:
  rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run rotation (sync new problems + rotate daily challenge)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://ykqxkfazxsyantffjouf.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ARENA_CRYPTO_KEY: ${{ secrets.ARENA_CRYPTO_KEY }}
        run: npx tsx scripts/seed-arena.ts
