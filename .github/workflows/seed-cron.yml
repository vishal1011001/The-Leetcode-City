name: LC City Seeder Cron

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  workflow_dispatch:          # Allow manual trigger from GitHub UI

permissions:
  contents: read

concurrency:
  group: seed-cron
  cancel-in-progress: true

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check environment secrets
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ]; then
            echo "⚠️ NEXT_PUBLIC_SUPABASE_URL secret is empty, using fallback URL."
          else
            echo "✅ NEXT_PUBLIC_SUPABASE_URL secret is present."
          fi
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "❌ Error: SUPABASE_SERVICE_ROLE_KEY secret is not set! The seeder will fail."
          else
            echo "✅ SUPABASE_SERVICE_ROLE_KEY secret is present."
          fi

      - name: Restore seeder state cache
        uses: actions/cache/restore@v4
        with:
          path: scripts/seed-lc-state.json
          key: seeder-state-${{ github.run_id }}
          restore-keys: |
            seeder-state-

      - name: Run seeder (5 pages ≈ 125 users)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://ykqxkfazxsyantffjouf.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/seed-lc-infinite.ts --pages 5

      - name: Save seeder state cache
        uses: actions/cache/save@v4
        with:
          path: scripts/seed-lc-state.json
          key: seeder-state-${{ github.run_id }}