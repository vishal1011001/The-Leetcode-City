name: Ban Spam Contributor

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ban-user-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Check Actor and Ban
        uses: actions/github-script@v7
        with:
          script: |
            const bannedUser = "saurabhhhcodes";
            const actor = context.actor;

            if (actor.toLowerCase() === bannedUser.toLowerCase()) {
              console.log(`Detected banned user: ${actor}. Initiating automated restriction sequence...`);
              
              const issueNumber = context.issue.number;

              // Case 1: Triggered by a comment
              if (context.eventName === "issue_comment") {
                console.log(`Banned user commented on issue/PR #${issueNumber}. Posting notice comment...`);
                
                try {
                  // Do NOT delete the comment, but post a warning/notice comment for visibility
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: `⚠️ **Notice**: The comment above was posted by a blocked user (**@saurabhhhcodes**). This user is restricted from contributing to this repository due to submitting senseless AI-generated slop and automated pull requests.\n\n*Reference ID: 8df4a6192bc53108c4ea782b5e28a5cf*`
                  });
                  console.log("✅ Warning notice comment posted.");
                } catch (err) {
                  console.error("Failed to post warning comment:", err);
                }

                // If the issue creator is also the banned user, perform cleanups (delete issue or close/lock PR)
                const issueCreator = context.payload.issue.user.login;
                if (issueCreator.toLowerCase() === bannedUser.toLowerCase()) {
                  console.log(`The target issue/PR #${issueNumber} was created by the banned user.`);
                  const isPullRequest = !!context.payload.issue.pull_request;
                  
                  if (!isPullRequest) {
                    // Delete their own issue entirely via GraphQL
                    console.log(`Deleting issue #${issueNumber} via GraphQL...`);
                    try {
                      await github.graphql(`
                        mutation($id: ID!) {
                          deleteIssue(input: {issueId: $id}) {
                            clientMutationId
                          }
                        }
                      `, { id: context.payload.issue.node_id });
                      console.log("✅ Issue deleted successfully.");
                    } catch (err) {
                      console.error("Failed to delete issue:", err);
                    }
                  } else {
                    // Close and lock their own PR
                    console.log(`Closing and locking PR #${issueNumber}...`);
                    try {
                      await github.rest.pulls.update({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: issueNumber,
                        state: "closed"
                      });
                      await github.rest.issues.lock({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issueNumber,
                        lock_reason: "spam"
                      });
                      console.log("✅ PR closed and locked.");
                    } catch (err) {
                      console.error("Failed to close/lock PR:", err);
                    }
                  }
                } else {
                  console.log(`Issue/PR #${issueNumber} was created by ${issueCreator} (not the banned user). Leaving conversation unlocked and open.`);
                }
              }

              // Case 2: Triggered by opening a Pull Request
              if (context.eventName === "pull_request_target") {
                console.log(`Closing PR #${issueNumber}...`);
                try {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: `🛑 **Automated Repository Action**\n\nThe user **@saurabhhhcodes** is blocked from contributing to this repository due to submitting senseless AI-generated slop and automated PR generation.\n\nThis pull request has been closed and locked automatically.\n\n*Reference ID: 8df4a6192bc53108c4ea782b5e28a5cf*`
                  });
                  await github.rest.pulls.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: issueNumber,
                    state: "closed"
                  });
                  await github.rest.issues.lock({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    lock_reason: "spam"
                  });
                  console.log("✅ PR closed and locked.");
                } catch (err) {
                  console.error("Failed to close/lock PR:", err);
                }
              }

              // Case 3: Triggered by opening an Issue
              if (context.eventName === "issues") {
                console.log(`Deleting issue #${issueNumber} via GraphQL...`);
                try {
                  await github.graphql(`
                    mutation($id: ID!) {
                      deleteIssue(input: {issueId: $id}) {
                        clientMutationId
                      }
                    }
                  `, { id: context.payload.issue.node_id });
                  console.log("✅ Issue deleted successfully.");
                } catch (err) {
                  console.error("Failed to delete issue:", err);
                }
              }
            } else {
              console.log(`Actor ${actor} is not banned. No action taken.`);
            }
