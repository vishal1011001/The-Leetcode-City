name: Auto Review & Approve

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

permissions:
  pull-requests: write
  issues: write
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-review:
    name: Auto-approve after CI passes
    runs-on: ubuntu-latest
    # Only run when CI succeeded and it was triggered by a PR
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.event == 'pull_request_target' || github.event.workflow_run.event == 'pull_request')

    steps:
      - name: Get PR number from workflow run
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const headSha = run.head_sha;
            const headBranch = run.head_branch;

            console.log(`CI passed for SHA: ${headSha}, branch: ${headBranch}`);

            let pr = null;

            // 1. Try retrieving from run.pull_requests
            const prsFromRun = run.pull_requests;
            if (prsFromRun && prsFromRun.length > 0) {
              pr = prsFromRun[0];
              console.log(`Found PR #${pr.number} directly in workflow run payload.`);
            }

            // 2. Fallback: search open PRs by SHA or branch
            if (!pr) {
              console.log(`workflow_run.pull_requests is empty (common for forks). Searching open PRs...`);
              const { data: openPRs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100
              });

              // Try by exact SHA
              pr = openPRs.find(p => p.head.sha === headSha);

              // Try by branch name
              if (!pr && headBranch) {
                pr = openPRs.find(p => p.head.ref === headBranch);
              }

              // Try by checking recent commits on each open PR
              if (!pr) {
                console.log('SHA/branch match failed. Checking recent PR commits...');
                for (const candidate of openPRs.slice(0, 20)) {
                  try {
                    const { data: commits } = await github.rest.pulls.listCommits({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: candidate.number,
                      per_page: 5
                    });
                    if (commits.some(c => c.sha === headSha)) {
                      pr = candidate;
                      console.log(`Found PR #${candidate.number} via commit history match.`);
                      break;
                    }
                  } catch (e) {
                    // skip
                  }
                }
              }
            }

            if (!pr) {
              console.log('No open PR found matching this workflow run. Skipping.');
              core.setOutput('pr_number', '');
              return;
            }

            // Fetch full PR data
            const { data: fullPR } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            console.log(`Found PR #${fullPR.number}: "${fullPR.title}" by @${fullPR.user.login}`);

            // Skip if the PR author is Ixotic27 (don't self-review)
            if (fullPR.user.login === 'Ixotic27') {
              console.log('PR author is Ixotic27. Skipping self-review.');
              core.setOutput('pr_number', '');
              return;
            }

            core.setOutput('pr_number', fullPR.number.toString());
            core.setOutput('pr_title', fullPR.title);
            core.setOutput('pr_author', fullPR.user.login);

      - name: Assign Ixotic27 as Reviewer
        if: steps.get-pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REVIEWER_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt('${{ steps.get-pr.outputs.pr_number }}', 10);
            console.log(`Requesting Ixotic27 as reviewer for PR #${prNumber}...`);
            try {
              // Check if already requested
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              const alreadyRequested = pr.requested_reviewers?.some(r => r.login === 'Ixotic27');
              if (alreadyRequested) {
                console.log('Ixotic27 already requested as reviewer. Skipping.');
                return;
              }

              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: ['Ixotic27']
              });
              console.log('Successfully assigned Ixotic27 as reviewer!');
            } catch (err) {
              console.error('Failed to assign reviewer:', err.message);
              // Non-fatal — continue to approval step
            }

      - name: Approve PR as Ixotic27
        if: steps.get-pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          # Use REVIEWER_PAT so the review is attributed to Ixotic27, fall back to GITHUB_TOKEN
          github-token: ${{ secrets.REVIEWER_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt('${{ steps.get-pr.outputs.pr_number }}', 10);
            const prTitle = `${{ steps.get-pr.outputs.pr_title }}`;
            const prAuthor = `${{ steps.get-pr.outputs.pr_author }}`;

            console.log(`Approving PR #${prNumber} ("${prTitle}") by @${prAuthor}...`);

            try {
              // Check if already reviewed to avoid duplicate approvals
              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });

              const alreadyApproved = reviews.some(
                r => r.user?.login === 'Ixotic27' && r.state === 'APPROVED'
              );

              if (alreadyApproved) {
                console.log('PR already approved by Ixotic27. Skipping duplicate review.');
                return;
              }

              // Submit the approval review
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'APPROVE',
                body: `✅ **LGTM!** All CI checks have passed. Code review approved.\n\nThank you for your contribution @${prAuthor}! 🚀`
              });

              console.log(`Successfully approved PR #${prNumber}!`);
            } catch (err) {
              console.error(`Failed to approve PR #${prNumber}:`, err.message);
              core.setFailed(err.message);
            }
