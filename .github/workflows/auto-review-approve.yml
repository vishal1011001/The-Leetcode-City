name: Auto Review & Approve

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
  status:

permissions:
  pull-requests: write
  issues: write
  contents: read
  actions: read
  statuses: read
  checks: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-review:
    name: Auto-approve after CI passes
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.event == 'pull_request_target' || github.event.workflow_run.event == 'pull_request')) ||
      (github.event_name == 'status' && contains(github.event.context, 'Vercel') && github.event.state == 'success')

    steps:
      - name: Get PR number
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            let headSha;
            let headBranch = null;

            if (context.eventName === 'workflow_run') {
              headSha = context.payload.workflow_run.head_sha;
              headBranch = context.payload.workflow_run.head_branch;
            } else if (context.eventName === 'status') {
              headSha = context.payload.sha;
            }

            console.log(`Event: ${context.eventName}, SHA: ${headSha}, branch: ${headBranch}`);

            let pr = null;

            // 1. Try retrieving from run.pull_requests
            if (context.eventName === 'workflow_run' && context.payload.workflow_run.pull_requests.length > 0) {
              pr = context.payload.workflow_run.pull_requests[0];
              console.log(`Found PR #${pr.number} directly in workflow run payload.`);
            }

            // 2. Fallback: search open PRs by SHA or branch
            if (!pr) {
              console.log(`Searching open PRs for SHA ${headSha}...`);
              const { data: openPRs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100
              });

              // Try by exact SHA
              pr = openPRs.find(p => p.head.sha === headSha);

              // Try by branch name
              if (!pr && headBranch) {
                pr = openPRs.find(p => p.head.ref === headBranch);
              }

              // Try by checking recent commits on each open PR
              if (!pr) {
                console.log('SHA/branch match failed. Checking recent PR commits...');
                for (const candidate of openPRs.slice(0, 20)) {
                  try {
                    const { data: commits } = await github.rest.pulls.listCommits({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: candidate.number,
                      per_page: 5
                    });
                    if (commits.some(c => c.sha === headSha)) {
                      pr = candidate;
                      console.log(`Found PR #${candidate.number} via commit history match.`);
                      break;
                    }
                  } catch (e) {
                    // skip
                  }
                }
              }
            }

            if (!pr) {
              console.log('No open PR found matching this event. Skipping.');
              core.setOutput('pr_number', '');
              return;
            }

            // Fetch full PR data
            const { data: fullPR } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            console.log(`Found PR #${fullPR.number}: "${fullPR.title}" by @${fullPR.user.login}`);

            // Skip if the PR author is Ixotic27 (don't self-review)
            if (fullPR.user.login === 'Ixotic27') {
              console.log('PR author is Ixotic27. Skipping self-review.');
              core.setOutput('pr_number', '');
              return;
            }

            core.setOutput('pr_number', fullPR.number.toString());
            core.setOutput('pr_title', fullPR.title);
            core.setOutput('pr_author', fullPR.user.login);
            core.setOutput('head_sha', headSha);

      - name: Verify Vercel and CI Status
        if: steps.get-pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = '${{ steps.get-pr.outputs.head_sha }}';
            console.log(`Checking status for SHA ${headSha}...`);
            
            const maxRetries = 30; // 7.5 minutes total
            const delayMs = 15000;
            
            for (let i = 0; i < maxRetries; i++) {
              // 1. Check Vercel Status
              const { data: commitStatus } = await github.rest.repos.getCombinedStatusForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha
              });
              
              const vercelStatus = commitStatus.statuses.find(s => s.context.includes('Vercel'));
              let vercelSuccess = false;
              let vercelFailed = false;

              if (vercelStatus) {
                if (vercelStatus.state === 'success') {
                  vercelSuccess = true;
                } else if (vercelStatus.state === 'error' || vercelStatus.state === 'failure') {
                  vercelFailed = true;
                }
              }

              // 2. Check CI Pipeline Status (Check Runs)
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha
              });

              const requiredChecks = ['Lint · Build', 'Production Build'];
              let ciSuccess = true;
              let ciFailed = false;
              let ciPending = false;

              for (const checkName of requiredChecks) {
                const run = checks.check_runs.find(cr => cr.name === checkName);
                if (!run) {
                  ciPending = true;
                  ciSuccess = false;
                } else if (run.status !== 'completed') {
                  ciPending = true;
                  ciSuccess = false;
                } else if (run.conclusion !== 'success' && run.conclusion !== 'skipped') {
                  ciFailed = true;
                  ciSuccess = false;
                }
              }

              console.log(`Vercel: ${vercelStatus ? vercelStatus.state : 'pending'}, CI: ${ciSuccess ? 'success' : (ciFailed ? 'failed' : 'pending')}`);

              if (vercelSuccess && ciSuccess) {
                console.log('Both Vercel and CI are successful!');
                return;
              }

              if (ciFailed) {
                 core.setFailed('CI checks failed. Aborting auto-approval.');
                 return;
              }

              if (vercelFailed) {
                 core.setFailed('Vercel deployment failed or requires auth. Aborting. Will retry automatically when Vercel succeeds.');
                 return;
              }

              console.log(`Sleeping for 15 seconds... (Attempt ${i + 1}/${maxRetries})`);
              await new Promise(r => setTimeout(r, delayMs));
            }
            
            core.setFailed('Timed out waiting for checks to complete.');

      - name: Assign Ixotic27 as Reviewer
        if: steps.get-pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REVIEWER_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt('${{ steps.get-pr.outputs.pr_number }}', 10);
            console.log(`Requesting Ixotic27 as reviewer for PR #${prNumber}...`);
            try {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              const alreadyRequested = pr.requested_reviewers?.some(r => r.login === 'Ixotic27');
              if (alreadyRequested) {
                console.log('Ixotic27 already requested as reviewer. Skipping.');
                return;
              }
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: ['Ixotic27']
              });
              console.log('Successfully assigned Ixotic27 as reviewer!');
            } catch (err) {
              console.error('Failed to assign reviewer:', err.message);
            }

      - name: Approve PR as Ixotic27
        if: steps.get-pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REVIEWER_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt('${{ steps.get-pr.outputs.pr_number }}', 10);
            const prTitle = `${{ steps.get-pr.outputs.pr_title }}`;
            const prAuthor = `${{ steps.get-pr.outputs.pr_author }}`;

            console.log(`Approving PR #${prNumber} ("${prTitle}") by @${prAuthor}...`);

            try {
              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });

              const alreadyApproved = reviews.some(
                r => r.user?.login === 'Ixotic27' && r.state === 'APPROVED'
              );

              if (alreadyApproved) {
                console.log('PR already approved by Ixotic27. Skipping duplicate review.');
                return;
              }

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'APPROVE',
                body: `✅ **LGTM!** All CI checks have passed. Code review approved.\n\nThank you for your contribution @${prAuthor}! 🚀`
              });

              console.log(`Successfully approved PR #${prNumber}!`);
            } catch (err) {
              console.error(`Failed to approve PR #${prNumber}:`, err.message);
              core.setFailed(err.message);
            }
