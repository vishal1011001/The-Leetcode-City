name: Auto Issue Manager

on:
  issue_comment:
    types: [created]
  issues:
    types: [unlabeled]

permissions:
  issues: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issue_comment' && !github.event.issue.pull_request && github.event.comment.user.type != 'Bot') ||
      (github.event_name == 'issues' && github.event.action == 'unlabeled')
    steps:
      - name: Handle Auto-Assignment and Triage Approval
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const issueState = issue.state;
            
            if (issueState === 'closed') return;

            // Handle triage approval (label removed)
            if (context.eventName === 'issues' && context.payload.action === 'unlabeled') {
              if (context.payload.label.name === 'needs-triage') {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ **Admin Approved!**\n\nThis issue has been reviewed and approved by the project maintainers. It is now open for contribution! 🎉\n\nTo claim this issue, simply comment \`assign me\` along with your \`### Proposed Solution\`.`
                });
              }
              return;
            }

            // Handle issue comments (assignment requests)
            if (context.eventName !== 'issue_comment') return;

            const commentBody = context.payload.comment.body.toLowerCase();
            const commenter = context.payload.comment.user.login;
            const assignees = issue.assignees.map(a => a.login);
            const labels = issue.labels.map(l => l.name);

            // Keywords that indicate a user wants to be assigned
            const wantsAssignment =
              commentBody.includes('assign me') ||
              commentBody.includes('i would like to work on this') ||
              commentBody.includes('can i take this') ||
              commentBody.includes('can i work on this') ||
              commentBody.includes('i want to work on this') ||
              commentBody.includes('i want to take this') ||
              commentBody.includes('let me work on this') ||
              commentBody.includes('let me take this') ||
              commentBody.includes('i want to fix this') ||
              commentBody.includes('i want to contribute') ||
              commentBody.includes('can i be assigned') ||
              commentBody.includes('assign me to this') ||
              commentBody.includes('assign me this') ||
              commentBody.includes('i will work on this') ||
              commentBody.includes('i can work on this') ||
              commentBody.includes('i am interested') ||
              commentBody.includes("i'm interested") ||
              commentBody.includes("i'd like to work") ||
              commentBody.includes('id like to work') ||
              commentBody.includes("i'll work on this") ||
              commentBody.includes('ill work on this') ||
              commentBody.includes('please assign me') ||
              commentBody.includes('gssoc');

            if (!wantsAssignment) return;

            // Prevent assignment if the issue is still under triage
            if (labels.includes('needs-triage')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Hi @${commenter}, thank you for your interest! 🙌\n\nHowever, this issue is currently marked as \`needs-triage\`, meaning it is still being reviewed by the project admin. Please wait until the issue is approved before requesting to be assigned.`
              });
              return;
            }

            // Check if they included a proposed solution
            const hasProposedSolution = commentBody.includes('proposed solution');

            if (!hasProposedSolution && assignees.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `Hi @${commenter}, thank you for your interest! 🙌\n\nTo be assigned to this issue, you must include a **Proposed Solution** in your comment. This helps us ensure that you have a clear plan before starting work.\n\nPlease reply again with your approach, including a heading like \`### Proposed Solution\` or \`My Proposed Solution\`.`
              });
              return;
            }

            if (assignees.length === 0) {

              // ── 24-Hour Rate Limit: max 3 issues per 24 hours ──
              const { data: userAssignedIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                assignee: commenter,
                state: 'open',
                per_page: 100,
              });

              // Filter to actual issues (not PRs)
              const openAssignedIssues = userAssignedIssues.filter(
                i => !i.pull_request && i.number !== context.issue.number
              );

              if (openAssignedIssues.length >= 3) {
                const issueList = openAssignedIssues
                  .slice(0, 3)
                  .map(i => `> 📋 [#${i.number} — ${i.title}](${i.html_url})`)
                  .join('\n');

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `Hi @${commenter}, thank you for your enthusiasm! 🙌\n\nHowever, you already have **${openAssignedIssues.length}/3** active assigned issues (the maximum allowed).\n\nPlease complete or close one of your current issues before requesting a new one:\n\n${issueList}\n\nThank you for understanding! 💙`
                });
                return;
              }

              // ── All checks passed → Assign the user ──
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                assignees: [commenter]
              });

              // Welcome message with 48-hour deadline and PR rules
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `Hello @${commenter}, you have been selected to work on this issue! 🚀 Please read the \`CONTRIBUTING.md\` file before starting.\n\n⏰ **Deadline: You have 48 hours to submit a Pull Request for this issue.** If no PR is submitted within that time, the issue will be unassigned and made available for other contributors. This keeps the project moving and ensures everyone gets a fair opportunity!\n\n**📝 Important - PR Submission Rules:**\n1. **Branch Name:** Please name your branch starting with the issue number (e.g., \`${context.issue.number}-feature-name\`).\n2. **PR Description:** Make sure your Pull Request description includes \`Fixes #${context.issue.number}\` so it automatically links to this issue and inherits its labels.\n\n⭐ **If you're excited to contribute, please consider starring this repository to help increase its visibility and support the developer!**\n\n🔒 *This conversation will now be locked. Please use your Pull Request for any further discussion about this issue.*`
              });

              // Automatically add GSSoC labels if not present
              const labels = context.payload.issue.labels.map(l => l.name);
              const labelsToAdd = [];
              if (!labels.includes('Gssoc 26')) labelsToAdd.push('Gssoc 26');
              if (!labels.includes('gssoc:approved')) labelsToAdd.push('gssoc:approved');

              if (labelsToAdd.length > 0) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: labelsToAdd
                });
              }

              // Lock the conversation so only collaborators can comment
              await github.rest.issues.lock({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                lock_reason: 'resolved'
              });

            } else if (!assignees.includes(commenter)) {
              // Issue is already assigned to someone else
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `Hi @${commenter}, this issue is already assigned to @${assignees[0]}. Issues are assigned on a first-come, first-served basis. Please feel free to look for other unassigned issues to contribute to! 🌟`
              });
            }
