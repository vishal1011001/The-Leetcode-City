name: Auto Issue Manager

on:
  issue_comment:
    types: [created]
  issues:
    types: [unlabeled, assigned]

permissions:
  issues: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issue_comment' && !github.event.issue.pull_request && github.event.comment.user.type != 'Bot') ||
      (github.event_name == 'issues' && github.event.action == 'unlabeled') ||
      (github.event_name == 'issues' && github.event.action == 'assigned')
    steps:
      - name: Handle Auto-Assignment and Triage Approval
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const issueState = issue.state;
            
            if (issueState === 'closed') return;

            // Handle triage approval (label removed)
            if (context.eventName === 'issues' && context.payload.action === 'unlabeled') {
              if (context.payload.label.name === 'needs-triage') {
                const authorLogin = issue.user.login;
                let isCreatorAssigned = false;

                // ── Creator Auto-Assign Logic ──
                // If it's a real user (not bot, not Ixotic27), try to assign them their own issue
                if (issue.user.type !== 'Bot' && authorLogin !== 'Ixotic27') {
                  const { data: userAssignedIssues } = await github.rest.issues.listForRepo({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    assignee: authorLogin,
                    state: 'open',
                    per_page: 100,
                  });
                  const openAssignedIssues = userAssignedIssues.filter(i => !i.pull_request && i.number !== issue.number);
                  
                  if (openAssignedIssues.length < 5) {
                    // Assign the author
                    await github.rest.issues.addAssignees({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      assignees: [authorLogin]
                    });
                    
                    isCreatorAssigned = true;
                    
                    const isCritical = issue.labels.some(l => l.name === 'level:critical');
                    const deadlineText = isCritical ? '4 days (96 hours)' : '48 hours';

                    let bonusText = '';
                    if (openAssignedIssues.length >= 3) {
                      bonusText = `\n\n✨ **Bonus Slot Used:** You already have ${openAssignedIssues.length} active assignments, but because you are the author of this issue, you get to use one of your +2 bonus slots!`;
                    }

                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      body: `✅ **Admin Approved!**\n\nHi @${authorLogin}, this issue has been reviewed and approved by the project maintainers. Since you raised this issue, you have been automatically assigned to it! 🚀${bonusText}\n\n⏰ **Deadline: You have ${deadlineText} from this exact moment to submit a Pull Request.**\n\n**📝 Important - PR Submission Rules:**\n1. **Branch Name:** Please name your branch starting with the issue number (e.g., \`${issue.number}-feature-name\`).\n2. **PR Description:** Make sure your Pull Request description includes \`Fixes #${issue.number}\`.\n\n🔒 *This conversation will now be locked. Please use your Pull Request for any further discussion about this issue.*`
                    });

                    // Lock the issue
                    await github.rest.issues.lock({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      lock_reason: 'resolved'
                    });
                  } else {
                    // Over limit
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      body: `✅ **Admin Approved!**\n\nHi @${authorLogin}, this issue has been reviewed and approved! We would normally auto-assign it to you, but you already have **${openAssignedIssues.length}/5** active assignments (which includes your +2 bonus slots as the author).\n\nThis issue is now open for contribution! 🎉 To claim this issue, simply comment \`assign me\` along with your \`### Proposed Solution\`.`
                    });
                  }
                }
                
                if (!isCreatorAssigned && (issue.user.type === 'Bot' || authorLogin === 'Ixotic27')) {
                   // Normal approval message for bots and maintainer
                   await github.rest.issues.createComment({
                     owner: context.repo.owner,
                     repo: context.repo.repo,
                     issue_number: issue.number,
                     body: `✅ **Admin Approved!**\n\nHi @${authorLogin}, this issue has been reviewed and approved by the project maintainers. It is now open for contribution! 🎉\n\nTo claim this issue, simply comment \`assign me\` along with your \`### Proposed Solution\`.`
                   });
                }

                // Auto-detect type and difficulty from issue content
                const issueTitle = issue.title || '';
                const issueBody = issue.body || '';
                const allText = `${issueTitle} ${issueBody}`.toLowerCase();

                let labelsToAdd = new Set(['Gssoc 26', 'gssoc:approved', 'good first issue']);

                // 1. Detect Type
                const prefixMapping = {
                  'fix': 'type:bug', 'bug': 'type:bug', 'bugfix': 'type:bug', 'hotfix': 'type:bug',
                  'feat': 'type:feature', 'feature': 'type:feature',
                  'docs': 'type:docs', 'doc': 'type:docs',
                  'test': 'type:testing', 'testing': 'type:testing',
                  'security': 'type:security', 'sec': 'type:security',
                  'perf': 'type:performance', 'performance': 'type:performance',
                  'style': 'type:design', 'design': 'type:design', 'ui': 'type:design', 'css': 'type:design',
                  'refactor': 'type:refactor', 'cleanup': 'type:refactor',
                };

                let detectedType = null;
                const conventionalRegex = /^\s*\[?(?:bug|feature|docs|test|security|perf|style|refactor|fix|feat|ui)\]?\s*[:-]/i;
                const match = issueTitle.match(conventionalRegex);
                if (match) {
                  const prefix = match[0].replace(/[^a-zA-Z]/g, '').toLowerCase();
                  if (prefixMapping[prefix]) detectedType = prefixMapping[prefix];
                }
                if (!detectedType) {
                  const clean = issueTitle.toLowerCase().trim();
                  for (const [key, label] of Object.entries(prefixMapping)) {
                    if (clean.includes(`[${key}]`) || clean.startsWith(key + ':') || clean.startsWith(key + ' -')) {
                      detectedType = label;
                      break;
                    }
                  }
                }
                if (detectedType) labelsToAdd.add(detectedType);

                // 2. Detect Difficulty
                const currentLabels = issue.labels.map(l => l.name);
                const hasDifficulty = currentLabels.some(l => l.startsWith('level:'));
                
                if (!hasDifficulty) {
                  const difficultyKeywords = {
                    'level:critical':     ['critical', 'urgent', 'hotfix', 'fatal', 'broken'],
                    'level:advanced':     ['advanced', 'complex', 'architecture', 'security', 'migration', 'database', 'restructure'],
                    'level:intermediate': ['intermediate', 'moderate', 'refactor', 'optimize', 'integration', 'api endpoint', 'middleware'],
                    'level:beginner':     ['beginner', 'easy', 'simple', 'typo', 'readme', 'docs', 'documentation', 'comment', 'label', 'badge', 'color', 'text change'],
                  };

                  let detectedDifficulty = null;
                  for (const [level, keywords] of Object.entries(difficultyKeywords)) {
                    if (keywords.some(kw => allText.includes(kw))) {
                      detectedDifficulty = level;
                      break;
                    }
                  }
                  labelsToAdd.add(detectedDifficulty || 'level:beginner');
                }

                // Filter out labels the issue already has
                const finalLabels = Array.from(labelsToAdd).filter(l => !currentLabels.includes(l));

                if (finalLabels.length > 0) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    labels: finalLabels
                  });
                }
              }
              return;
            }
            
            // Handle manual assignment by maintainer through UI
            if (context.eventName === 'issues' && context.payload.action === 'assigned') {
              const assignee = context.payload.assignee.login;
              if (context.payload.sender.type === 'Bot') return; // Ignore if assigned by another bot

              const labels = issue.labels.map(l => l.name);
              const isCritical = labels.includes('level:critical');
              const deadlineText = isCritical ? '4 days (96 hours)' : '48 hours';

              // Post the welcome message
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Hello @${assignee}, you have been manually assigned to work on this issue by the maintainer! 🚀 Please read the \`CONTRIBUTING.md\` file before starting.\n\n⏰ **Deadline: You have ${deadlineText} from this exact moment to submit a Pull Request for this issue.** If no PR is submitted within that time, the issue will be unassigned and made available for other contributors. This keeps the project moving and ensures everyone gets a fair opportunity!\n\n**📝 Important - PR Submission Rules:**\n1. **Branch Name:** Please name your branch starting with the issue number (e.g., \`${issue.number}-feature-name\`).\n2. **PR Description:** Make sure your Pull Request description includes \`Fixes #${issue.number}\` so it automatically links to this issue and inherits its labels.\n\n⭐ **If you're excited to contribute, please consider starring this repository to help increase its visibility and support the developer!**\n\n🔒 *This conversation will now be locked. Please use your Pull Request for any further discussion about this issue.*`
              });

              // Add GSSoC labels if not present
              const labelsToAdd = [];
              if (!labels.includes('Gssoc 26')) labelsToAdd.push('Gssoc 26');
              if (!labels.includes('gssoc:approved')) labelsToAdd.push('gssoc:approved');

              if (labelsToAdd.length > 0) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: labelsToAdd
                });
              }

              // Lock the conversation
              try {
                await github.rest.issues.lock({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  lock_reason: 'resolved'
                });
              } catch (e) {
                console.log("Could not lock issue, might already be locked:", e.message);
              }

              return;
            }

            // Handle issue comments (assignment requests)
            if (context.eventName !== 'issue_comment') return;

            const commentBody = context.payload.comment.body.toLowerCase();
            const commenter = context.payload.comment.user.login;
            const assignees = issue.assignees.map(a => a.login);
            const labels = issue.labels.map(l => l.name);

            // Keywords that indicate a user wants to be assigned
            const wantsAssignment =
              commentBody.includes('assign me') ||
              commentBody.includes('i would like to work on this') ||
              commentBody.includes('can i take this') ||
              commentBody.includes('can i work on this') ||
              commentBody.includes('i want to work on this') ||
              commentBody.includes('i want to take this') ||
              commentBody.includes('let me work on this') ||
              commentBody.includes('let me take this') ||
              commentBody.includes('i want to fix this') ||
              commentBody.includes('i want to contribute') ||
              commentBody.includes('can i be assigned') ||
              commentBody.includes('assign me to this') ||
              commentBody.includes('assign me this') ||
              commentBody.includes('i will work on this') ||
              commentBody.includes('i can work on this') ||
              commentBody.includes('i am interested') ||
              commentBody.includes("i'm interested") ||
              commentBody.includes("i'd like to work") ||
              commentBody.includes('id like to work') ||
              commentBody.includes("i'll work on this") ||
              commentBody.includes('ill work on this') ||
              commentBody.includes('please assign me') ||
              commentBody.includes('gssoc');

            if (!wantsAssignment) return;

            // Prevent assignment if the issue is still under triage or not approved yet
            if (labels.includes('needs-triage') || !labels.includes('gssoc:approved')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Hi @${commenter}, thank you for your interest! 🙌\n\nHowever, this issue has not been approved for contribution yet. It must be reviewed by the maintainer and given the \`gssoc:approved\` label before you can be assigned. Please wait for approval!`
              });
              return;
            }

            // Check if they included a proposed solution
            const hasProposedSolution = commentBody.includes('proposed solution');

            if (!hasProposedSolution && assignees.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `Hi @${commenter}, thank you for your interest! 🙌\n\nTo be assigned to this issue, you must include a **Proposed Solution** in your comment. This helps us ensure that you have a clear plan before starting work.\n\nPlease reply again with your approach, including a heading like \`### Proposed Solution\` or \`My Proposed Solution\`.`
              });
              return;
            }

            if (assignees.length === 0) {

              // ── 24-Hour Rate Limit: max 3 issues per 24 hours ──
              const { data: userAssignedIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                assignee: commenter,
                state: 'open',
                per_page: 100,
              });

              // Filter to actual issues (not PRs)
              const openAssignedIssues = userAssignedIssues.filter(
                i => !i.pull_request && i.number !== context.issue.number
              );

              const isCreator = (commenter === issue.user.login);
              const maxIssues = isCreator ? 5 : 3;

              if (openAssignedIssues.length >= maxIssues) {
                const issueList = openAssignedIssues
                  .slice(0, maxIssues)
                  .map(i => `> 📋 [#${i.number} — ${i.title}](${i.html_url})`)
                  .join('\n');

                const limitExplanation = isCreator 
                  ? `(your maximum allowed limit of 5, which includes your +2 bonus slots for being the issue author)` 
                  : `(the standard maximum allowed limit of 3. Note: If you were the original author of this issue, your limit would be 5)`;

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `Hi @${commenter}, thank you for your enthusiasm! 🙌\n\nHowever, you already have **${openAssignedIssues.length}/${maxIssues}** active assigned issues ${limitExplanation}.\n\nPlease complete or close one of your current issues before requesting a new one:\n\n${issueList}\n\nThank you for understanding! 💙`
                });
                return;
              }

              // ── All checks passed → Assign the user ──
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                assignees: [commenter]
              });

              const isCritical = labels.includes('level:critical');
              const deadlineText = isCritical ? '4 days (96 hours)' : '48 hours';

              // Welcome message with deadline and PR rules
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `Hello @${commenter}, you have been selected to work on this issue! 🚀 Please read the \`CONTRIBUTING.md\` file before starting.\n\n⏰ **Deadline: You have ${deadlineText} from this exact moment to submit a Pull Request for this issue.** If no PR is submitted within that time, the issue will be unassigned and made available for other contributors. This keeps the project moving and ensures everyone gets a fair opportunity!\n\n**📝 Important - PR Submission Rules:**\n1. **Branch Name:** Please name your branch starting with the issue number (e.g., \`${context.issue.number}-feature-name\`).\n2. **PR Description:** Make sure your Pull Request description includes \`Fixes #${context.issue.number}\` so it automatically links to this issue and inherits its labels.\n\n⭐ **If you're excited to contribute, please consider starring this repository to help increase its visibility and support the developer!**\n\n🔒 *This conversation will now be locked. Please use your Pull Request for any further discussion about this issue.*`
              });

              // Automatically add GSSoC labels if not present
              const labelsToAdd = [];
              if (!labels.includes('Gssoc 26')) labelsToAdd.push('Gssoc 26');
              if (!labels.includes('gssoc:approved')) labelsToAdd.push('gssoc:approved');

              if (labelsToAdd.length > 0) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: labelsToAdd
                });
              }

              // Lock the conversation so only collaborators can comment
              await github.rest.issues.lock({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                lock_reason: 'resolved'
              });

            } else if (!assignees.includes(commenter)) {
              // Issue is already assigned to someone else
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `Hi @${commenter}, this issue is already assigned to @${assignees[0]}. Issues are assigned on a first-come, first-served basis. Please feel free to look for other unassigned issues to contribute to! 🌟`
              });
            }
