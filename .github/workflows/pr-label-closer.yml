name: PR Label Closer & Reopener

on:
  pull_request_target:
    types: [labeled]

permissions:
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  close-and-reopen:
    name: Auto Close PR and Reopen Issue
    runs-on: ubuntu-latest
    if: >
      github.event.label.name == 'invalid' ||
      github.event.label.name == 'gssoc:invalid' ||
      github.event.label.name == 'gssoc:spam' ||
      github.event.label.name == 'gssoc:ai-slop'

    steps:
      - name: Close invalid PR and Reopen Linked Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const prAuthor = pr.user.login;
            const prBody = pr.body ?? '';

            // 1. Fetch current labels on this PR
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber,
            });
            const labelNames = labels.map(l => l.name);
            const lacksVisuals = labelNames.includes('needs-visual-proof');
            const isSpam = labelNames.includes('gssoc:spam');
            const isAiSlop = labelNames.includes('gssoc:ai-slop');
            const isGssocInvalid = labelNames.includes('gssoc:invalid');

            // 2. Decide the close message & issue reopen reason
            let closeMessage = '';
            let reopenReason = '';

            if (isSpam) {
              closeMessage = `🚫 Hey @${prAuthor}!\n\nThis PR has been flagged as **spam** — a fabricated contribution with no real value. This PR will receive **0 GSSoC points** and is being closed immediately.\n\nRepeated spam submissions may result in being blocked from the project.`;
              reopenReason = `The PR was flagged as spam (fabricated contribution with no real value).`;
            } else if (isAiSlop) {
              closeMessage = `🤖 Hey @${prAuthor}!\n\nThis PR has been flagged as **AI-generated content** pasted without understanding or editing. The contributor could not explain the changes when asked.\n\nThis is different from AI-*assisted* work where the human understands every line. If you believe this is an error, please explain your changes in a comment and we’ll reconsider.\n\nThis PR will receive **0 GSSoC points**.`;
              reopenReason = `The PR was flagged as AI-generated content pasted without understanding.`;
            } else if (lacksVisuals) {
              closeMessage = `👋 Hey @${prAuthor}!\n\nIt looks like you forgot to train yourself and your AI to read the contribution rules—or even read the issue properly. Relevant visual proof (screenshots or videos) is explicitly required, not random unrelated screenshots.\n\nThis PR is now closed. 🤖`;
              reopenReason = `It looks like the assignee forgot to train themselves and their AI to read the contribution rules—or even read the issue properly. Relevant visual proof is explicitly required.`;
            } else {
              closeMessage = `👋 Hey @${prAuthor}!\n\nThis PR has been marked as **invalid** and is being closed. This is usually due to the assignee being unresponsive or failing to follow standard contribution guidelines.\n\nThis PR will receive **0 GSSoC points**. We appreciate your interest and hope to see higher quality contributions in the future.`;
              reopenReason = `The PR was marked as invalid due to the assignee being unresponsive or failing to follow standard contribution guidelines.`;
            }

            // 3. Comment on the PR and close it
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber,
              body: closeMessage
            });

            await github.rest.pulls.update({
              owner, repo, pull_number: prNumber,
              state: 'closed'
            });

            core.info(`Closed PR #${prNumber} as invalid.`);

            // 4. Parse linked issue numbers from the PR body to reopen them
            // Strip HTML comments first so template placeholders are not matched.
            const cleanBody = prBody.replace(/<!--[\s\S]*?-->/g, '');
            const BLOCK_REGEX = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)(?:\s*(?:and|,)?\s*#\d+)+/gi;
            const issueNumbers = [];
            let blockMatch;
            while ((blockMatch = BLOCK_REGEX.exec(cleanBody)) !== null) {
              const numRegex = /#(\d+)/g;
              let numMatch;
              while ((numMatch = numRegex.exec(blockMatch[0])) !== null) {
                issueNumbers.push(parseInt(numMatch[1], 10));
              }
            }
            const uniqueIssueNumbers = [...new Set(issueNumbers)];

            for (const issueNumber of uniqueIssueNumbers) {
              try {
                // Fetch issue to get assignees
                const { data: issueData } = await github.rest.issues.get({
                  owner, repo, issue_number: issueNumber
                });
                
                const assignees = issueData.assignees.map(a => a.login);
                if (assignees.length > 0) {
                  await github.rest.issues.removeAssignees({
                    owner, repo, issue_number: issueNumber,
                    assignees
                  });
                  core.info(`Unassigned ${assignees.join(', ')} from issue #${issueNumber}`);
                }

                // Reopen the issue
                await github.rest.issues.update({
                  owner, repo, issue_number: issueNumber,
                  state: 'open'
                });

                // Post a generic comment explaining why it was reopened
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `🔄 **This issue has been reopened and unassigned.**\n\nThe associated PR #${prNumber} by @${prAuthor} was closed for failing to follow proper contribution rules.\n\nThis issue is now back in the pool and open for other contributors to claim! Please ensure you read and follow the project guidelines before working on this. 🚀`
                });

                core.info(`Reopened linked issue #${issueNumber} and commented.`);
              } catch (err) {
                core.error(`Failed to reopen issue #${issueNumber}: ${err.message}`);
              }
            }
