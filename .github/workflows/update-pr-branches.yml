name: Auto Update PR Branches

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Update Open PR Branches
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REVIEWER_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log("Fetching all open PRs targeting main...");
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base: 'main',
              per_page: 100
            });

            console.log(`Found ${pulls.length} open pull requests.`);

            for (const pr of pulls) {
              console.log(`\n--- Processing PR #${pr.number} (Branch: ${pr.head.ref}) ---`);
              
              if (pr.draft) {
                console.log(`PR #${pr.number} is a draft. Skipping.`);
                continue;
              }

              try {
                console.log(`Attempting to update branch for PR #${pr.number}...`);
                const response = await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pr.number
                });
                console.log(`Update triggered successfully. Status: ${response.status} - ${response.data.message}`);
              } catch (err) {
                console.error(`Error updating PR #${pr.number}:`, err.message);
              }
            }
