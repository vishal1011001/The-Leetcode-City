name: Milestone Manager

on:
  issues:
    types: [labeled]
  pull_request_target:
    types: [labeled]

permissions:
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  assign-to-milestone:
    if: >
      (github.event_name == 'issues' && github.event.label.name == 'GSSoC 2026' && github.event.issue.pull_request == null) ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'gssoc:approved')
    runs-on: ubuntu-latest
    steps:
      - name: Assign to GSSoC 2026 Milestone
        uses: actions/github-script@v7
        env:
          MILESTONE_NUMBER: '1'
        with:
          script: |
            const milestoneNumber = parseInt(process.env.MILESTONE_NUMBER, 10);

            // Works for both issues and pull_request events
            const issueNumber =
              context.payload.issue?.number ??
              context.payload.pull_request?.number;

            if (!issueNumber) {
              core.setFailed('Could not determine issue/PR number from event payload.');
              return;
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              milestone: milestoneNumber,
            });

            core.info(`Assigned #${issueNumber} to milestone ${milestoneNumber}.`);
