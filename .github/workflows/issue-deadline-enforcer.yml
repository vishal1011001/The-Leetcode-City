name: Issue Assignment Deadline Enforcer

on:
  schedule:
    # Run every 2 hours to check for stale assignments
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  enforce-deadlines:
    name: Check Issue Assignment Deadlines
    runs-on: ubuntu-latest

    steps:
      - name: Enforce 48-hour assignment deadlines
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const WARNING_HOURS = 36;
            const DEADLINE_HOURS = 48;
            const BOT_WARNING_MARKER = '<!-- deadline-warning-bot -->';
            const BOT_UNASSIGN_MARKER = '<!-- deadline-unassign-bot -->';

            // Fetch all open, assigned issues (not PRs)
            const allItems = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo,
              state: 'open',
              assignee: '*',
              per_page: 100,
            });

            const issues = allItems.filter(i => !i.pull_request);
            console.log(`Found ${issues.length} open assigned issues.`);

            const now = new Date();
            let warned = 0;
            let unassigned = 0;

            for (const issue of issues) {
              const assignees = issue.assignees ?? [];
              if (assignees.length === 0) continue;

              const labels = issue.labels.map(l => l.name);
              if (labels.includes('type:3d')) {
                console.log(`#${issue.number}: Has type:3d label, skipping deadline enforcement.`);
                continue;
              }

              // Skip issues by the repo owner (admins)
              const isAdminIssue = assignees.some(a => a.login === 'Ixotic27');
              if (isAdminIssue) continue;

              // Determine assignment time from the issue timeline
              // We use the most recent 'assigned' event
              let assignedAt = null;
              try {
                const events = await github.paginate(github.rest.issues.listEvents, {
                  owner, repo,
                  issue_number: issue.number,
                  per_page: 100,
                });

                // Find the latest 'assigned' event
                const assignedEvents = events.filter(e => e.event === 'assigned');
                if (assignedEvents.length > 0) {
                  assignedAt = new Date(assignedEvents[assignedEvents.length - 1].created_at);
                }
              } catch (e) {
                console.log(`Could not fetch timeline for #${issue.number}: ${e.message}`);
                continue;
              }

              if (!assignedAt) continue;

              const hoursElapsed = (now.getTime() - assignedAt.getTime()) / (1000 * 60 * 60);
              const assignee = assignees[0].login;

              // Check if there's already a linked PR (branch name starts with issue number)
              let hasLinkedPR = false;
              try {
                const { data: prs } = await github.rest.pulls.list({
                  owner, repo, state: 'open', per_page: 100,
                });
                hasLinkedPR = prs.some(pr => {
                  const branchMatch = pr.head.ref.match(/^(\d+)-/);
                  if (branchMatch && parseInt(branchMatch[1]) === issue.number) return true;
                  const bodyMatch = (pr.body || '').match(/(?:fix|fixes|close|closes|resolve|resolves)\s+#(\d+)/gi);
                  if (bodyMatch) {
                    return bodyMatch.some(m => m.match(/#(\d+)/)?.[1] === String(issue.number));
                  }
                  return false;
                });
              } catch (e) {
                console.log(`Could not check PRs for #${issue.number}: ${e.message}`);
              }

              // If there's a linked PR, the assignee is actively working — skip
              if (hasLinkedPR) {
                console.log(`#${issue.number} (@${assignee}): Has linked PR, skipping.`);
                continue;
              }

              // Fetch existing comments to check if we already warned/unassigned
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number: issue.number, per_page: 50,
              });

              const alreadyWarned = comments.some(c => c.body?.includes(BOT_WARNING_MARKER));
              const alreadyUnassigned = comments.some(c => c.body?.includes(BOT_UNASSIGN_MARKER));

              // Determine deadline based on difficulty label
              const isCritical = issue.labels.some(l => l.name === 'level:critical');
              const DEADLINE_HOURS = isCritical ? 96 : 48; // 4 days for critical, 48 hours for others
              const WARNING_HOURS = isCritical ? 72 : 36;  // Warn 24 hours before deadline for critical, 12 hours for others

              // ── PHASE 2: Deadline reached → Unassign ──
              if (hoursElapsed >= DEADLINE_HOURS && !alreadyUnassigned) {
                console.log(`#${issue.number} (@${assignee}): ${hoursElapsed.toFixed(1)}h elapsed → UNASSIGNING`);

                // Unassign all assignees
                await github.rest.issues.removeAssignees({
                  owner, repo,
                  issue_number: issue.number,
                  assignees: assignees.map(a => a.login),
                });

                // Unlock the issue so new contributors can claim it
                try {
                  await github.rest.issues.unlock({
                    owner, repo,
                    issue_number: issue.number
                  });
                } catch (e) {
                  console.log(`Could not unlock issue #${issue.number}: ${e.message}`);
                }

                // Post reopening comment
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: issue.number,
                  body: `${BOT_UNASSIGN_MARKER}\n⏰ **Assignment Expired**\n\nHey @${assignee}, the **${DEADLINE_HOURS}-hour deadline** for this issue has passed without a linked Pull Request.\n\nYou have been **unassigned** and this issue is now **open for other contributors** to claim.\n\n---\n\n🟢 **This issue is available!** If you'd like to work on it, comment below and you'll be assigned.\n\n> _Tip: When you start working, name your branch \`${issue.number}-your-feature-name\` so it auto-links to this issue._`,
                });

                unassigned++;
                continue;
              }

              // ── PHASE 1: Warning time reached → Warning ──
              if (hoursElapsed >= WARNING_HOURS && !alreadyWarned) {
                const remainingHours = Math.max(0, Math.ceil(DEADLINE_HOURS - hoursElapsed));
                console.log(`#${issue.number} (@${assignee}): ${hoursElapsed.toFixed(1)}h elapsed → WARNING (${remainingHours}h left)`);

                // Unlock the issue so they can reply if they need more time
                try {
                  await github.rest.issues.unlock({
                    owner, repo,
                    issue_number: issue.number
                  });
                } catch (e) {
                  console.log(`Could not unlock issue #${issue.number}: ${e.message}`);
                }

                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: issue.number,
                  body: `${BOT_WARNING_MARKER}\n⚠️ **Deadline Warning**\n\nHey @${assignee}, you were assigned to this issue **${Math.floor(hoursElapsed)} hours ago** and no linked Pull Request has been found yet.\n\n⏳ **You have approximately ${remainingHours} hours remaining** to submit a PR before you are automatically unassigned.\n\n**To keep your assignment:**\n1. Push your branch named \`${issue.number}-your-feature-name\`\n2. Open a Pull Request with \`Fixes #${issue.number}\` in the description\n\nIf you're stuck or need more time, please comment here and a maintainer can extend the deadline. If you can no longer work on this, please unassign yourself so others can pick it up. 🙏`,
                });

                warned++;
              } else if (hoursElapsed < WARNING_HOURS) {
                console.log(`#${issue.number} (@${assignee}): ${hoursElapsed.toFixed(1)}h elapsed — still within time.`);
              }
            }

            console.log(`\n🏁 Done! Warned: ${warned}, Unassigned: ${unassigned}`);
