name: CI Pipeline

on:
  pull_request_target:
    branches:
      - main

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Fetch base branch for diff
        if: github.event_name == 'pull_request_target'
        run: git fetch origin main:refs/remotes/origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: |
          # For PRs: only lint the files the contributor actually changed.
          # This prevents pre-existing errors in untouched files from
          # blocking new contributions.
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            CHANGED=$(git diff --name-only --diff-filter=d origin/main...HEAD \
              -- 'src/**/*.ts' 'src/**/*.tsx' 'src/**/*.js' 'src/**/*.jsx' | head -200)
            if [ -z "$CHANGED" ]; then
              echo "✅ No lintable source files changed in this PR. Skipping."
              exit 0
            fi
            echo "Linting changed source files only:"
            echo "$CHANGED"
            npx eslint --max-warnings=-1 $CHANGED
          else
            # Full lint on push to main (informational — do not block)
            npm run lint || true
          fi

  build:
    name: Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Production Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-anon-key-placeholder-string-12345"
        run: npm run build

