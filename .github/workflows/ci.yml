name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request_target:
    branches: [main]

# Public Supabase keys are needed for the Next.js build to prerender pages.
# These are the same keys embedded in the production client JS — safe to use here.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_PUBLIC_SUPABASE_URL: https://ykqxkfazxsyantffjouf.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrcXhrZmF6eHN5YW50ZmZqb3VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDYyNTEsImV4cCI6MjA4ODQyMjI1MX0.-sdtrt-WcwEQx5GScueNv9jyx7KgAfG3EHWIZdtSLa4
  NEXT_PUBLIC_BASE_URL: http://localhost:3001
  NEXT_PUBLIC_SITE_URL: http://localhost:3001
  NEXT_PUBLIC_APP_URL: http://localhost:3001

jobs:
  quality:
    name: Lint · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Fetch base branch for diff
        if: github.event_name == 'pull_request_target'
        run: git fetch origin main:refs/remotes/origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint (changed files only for PRs)
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            # Only lint source files changed in this PR (ignore deleted files)
            CHANGED=$(git diff --name-only --diff-filter=d origin/main...HEAD -- 'src/**/*.ts' 'src/**/*.tsx' 'src/**/*.js' 'src/**/*.jsx' | head -200)
            if [ -z "$CHANGED" ]; then
              echo "✅ No lintable source files changed in this PR. Skipping."
              exit 0
            fi
            echo "Linting changed source files only:"
            echo "$CHANGED"
            # Use --max-warnings=-1 so pre-existing warnings don't block the PR
            npx eslint --max-warnings=-1 $CHANGED || true
          else
            # Full lint on push to main (informational only)
            npm run lint || true
          fi

  build:
    name: Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: false
